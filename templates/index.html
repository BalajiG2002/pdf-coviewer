<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Co-Viewer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.11.338/pdf.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>PDF Co-Viewer</h1>
            <div class="session-info">
                <span id="connection-status">&#x26AA; Connecting...</span>
                <span id="user-count">Users: 0</span>
                <span id="role-indicator">Role: Loading...</span>
            </div>
        </div>

        <div class="controls">
            <div class="upload-section" id="upload-section">
                <label for="pdf-upload" class="file-upload-label" aria-label="Choose a PDF file to upload">
                    Choose PDF
                </label>
                <input type="file" id="pdf-upload" accept=".pdf" aria-label="PDF file input">
                <div id="share-url-section" class="hidden">
                    <input type="text" id="share-url" readonly aria-label="Session share URL">
                    <button onclick="copyShareUrl()" aria-label="Copy share link">Copy Link</button>
                </div>
            </div>

            <div class="navigation">
                <button id="prev-page" disabled aria-label="Previous page (Left Arrow)">&#9664; Previous</button>
                <span id="page-info" aria-live="polite">Page 1 of 1</span>
                <button id="next-page" disabled aria-label="Next page (Right Arrow)">Next &#9654;</button>
            </div>

            <div class="zoom-controls">
                <button onclick="changeZoom(-0.25)" aria-label="Zoom out">Zoom Out</button>
                <span id="zoom-level" aria-live="polite">100%</span>
                <button onclick="changeZoom(0.25)" aria-label="Zoom in">Zoom In</button>
            </div>

            <div class="extra-controls">
                <button id="laser-toggle" onclick="toggleLaserPointer()" class="hidden" aria-label="Toggle laser pointer">&#128308; Laser</button>
                <button onclick="toggleChat()" aria-label="Toggle chat panel">&#128172; Chat</button>
            </div>
        </div>

        <!-- Viewer area with laser-pointer canvas overlay -->
        <div class="viewer-container" id="viewer-container">
            <div class="canvas-wrapper" id="canvas-wrapper">
                <canvas id="pdf-viewer" aria-label="PDF viewer"></canvas>
                <canvas id="pointer-overlay" aria-hidden="true"></canvas>
            </div>
        </div>

        <div class="status-bar">
            <div id="loading-indicator" class="hidden" aria-live="polite">Loading...</div>
            <div id="error-message" class="hidden" role="alert"></div>
        </div>
    </div>

    <!-- Chat sidebar (Task 3.3) -->
    <div class="chat-sidebar hidden" id="chat-sidebar" aria-label="Chat panel">
        <div class="chat-header">
            <span>&#128172; Chat</span>
            <button onclick="toggleChat()" aria-label="Close chat">&#10005;</button>
        </div>
        <div class="chat-messages" id="chat-messages" aria-live="polite"></div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="Type a message..." maxlength="500"
                   aria-label="Chat message input"
                   onkeydown="if(event.key==='Enter') sendChat()">
            <button onclick="sendChat()" aria-label="Send chat message">Send</button>
        </div>
    </div>

    <script>
        // Session information passed from Flask
        const SESSION_ID = "{{ session_id }}";
        const IS_ADMIN = {{ 'true' if is_admin else 'false' }};
        // CSRF token for AJAX requests (Task 1.3)
        const CSRF_TOKEN = "{{ csrf_token() }}";
    </script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
